<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Watch Party — дивись разом</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      color: white;
    }

    /* Анімований фон */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-animation span {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 6s infinite linear;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      100% {
        transform: translateY(-100vh) scale(1);
        opacity: 1;
      }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 30px 20px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #fff, #e50914);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .header p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1rem;
    }

    /* Grid Layout */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }

    @media (max-width: 968px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Cards */
    .card {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card-title i {
      color: #e50914;
    }

    /* Inputs */
    .input-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      flex: 1;
      padding: 12px 18px;
      font-size: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #e50914;
      background: rgba(255, 255, 255, 0.15);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    /* Buttons */
    .btn {
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #e50914, #ff4757);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(229, 9, 20, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    /* Video Container */
    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    video {
      width: 100%;
      display: block;
      background: black;
    }

    /* Status */
    .status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status.success {
      background: rgba(76, 175, 80, 0.2);
      border: 1px solid #4caf50;
      color: #4caf50;
    }

    .status.error {
      background: rgba(244, 67, 54, 0.2);
      border: 1px solid #f44336;
      color: #f44336;
    }

    .status.warning {
      background: rgba(255, 152, 0, 0.2);
      border: 1px solid #ff9800;
      color: #ff9800;
    }

    .status.info {
      background: rgba(33, 150, 243, 0.2);
      border: 1px solid #2196f3;
      color: #2196f3;
    }

    /* Чат */
    .chat-container {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      height: 600px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-message {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e50914, #ff4757);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      flex-shrink: 0;
    }

    .chat-bubble {
      flex: 1;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 8px 12px;
    }

    .chat-name {
      font-weight: 600;
      font-size: 0.8rem;
      color: #e50914;
      margin-bottom: 4px;
    }

    .chat-text {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.9);
      word-break: break-word;
    }

    .chat-time {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 4px;
      text-align: right;
    }

    .chat-input-area {
      padding: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      gap: 10px;
    }

    .chat-input-area input {
      flex: 1;
      margin: 0;
    }

    /* Список глядачів */
    .viewers-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    .viewer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      transition: all 0.3s;
    }

    .viewer-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .viewer-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e50914, #ff4757);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
    }

    .viewer-info {
      flex: 1;
    }

    .viewer-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .viewer-status {
      font-size: 0.7rem;
      color: #4caf50;
    }

    .viewer-status i {
      font-size: 0.6rem;
    }

    .room-badge {
      display: inline-block;
      background: rgba(229, 9, 20, 0.2);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #e50914;
      margin-top: 10px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #e50914;
      border-radius: 10px;
    }

    .profile-section {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .profile-section select {
      flex: 1;
    }

    @media (max-width: 768px) {
      .header h1 { font-size: 2rem; }
      .input-group { flex-direction: column; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="bg-animation" id="bgAnimation"></div>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-film"></i> Watch Party</h1>
    <p>Дивись фільми та спілкуйся з друзями</p>
  </div>

  <div class="main-grid">
    <!-- Ліва колонка - Відео -->
    <div>
      <div class="card">
        <div class="card-title">
          <i class="fas fa-door-open"></i>
          <span>Кімната</span>
        </div>
        <div class="profile-section">
          <select id="avatarSelect">
            <option value="😀">😀 Веселий</option>
            <option value="😎">😎 Крутий</option>
            <option value="🥷">🥷 Ніндзя</option>
            <option value="🐱">🐱 Кіт</option>
            <option value="🐉">🐉 Дракон</option>
            <option value="🍕">🍕 Піца</option>
            <option value="🎮">🎮 Геймер</option>
            <option value="📺">📺 Кіноман</option>
          </select>
          <input type="text" id="nickname" placeholder="Ваше ім'я" maxlength="20">
        </div>
        <div class="input-group">
          <input type="text" id="room" placeholder="Назва кімнати (наприклад: anime-night)">
          <button class="btn btn-primary" onclick="joinRoom()">
            <i class="fas fa-sign-in-alt"></i> Join
          </button>
        </div>
        <div id="roomDisplay" class="room-badge" style="display: none;"></div>
      </div>

      <div class="card">
        <div class="card-title">
          <i class="fas fa-link"></i>
          <span>Відео</span>
        </div>
        <div class="input-group">
          <input type="text" id="videoUrl" placeholder="Посилання на .mp4 відео">
          <button class="btn btn-primary" onclick="setVideo()">
            <i class="fas fa-play"></i> Load
          </button>
        </div>
      </div>

      <div class="video-wrapper">
        <video id="video" controls></video>
      </div>

      <div id="status" class="status info">
        <i class="fas fa-info-circle"></i>
        <span>Готовий до роботи</span>
      </div>
    </div>

    <!-- Права колонка - Чат і глядачі -->
    <div>
      <!-- Список глядачів -->
      <div class="card">
        <div class="card-title">
          <i class="fas fa-users"></i>
          <span>Хто дивиться (<span id="viewerCount">0</span>)</span>
        </div>
        <div id="viewersList" class="viewers-list">
          <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 20px;">
            <i class="fas fa-spinner fa-spin"></i> Завантаження...
          </div>
        </div>
      </div>

      <!-- Чат -->
      <div class="chat-container">
        <div class="card-title" style="padding: 15px 15px 0 15px; margin-bottom: 0;">
          <i class="fas fa-comments"></i>
          <span>Чат</span>
        </div>
        <div id="chatMessages" class="chat-messages">
          <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 20px;">
            <i class="fas fa-comment-dots"></i> Повідомлень поки немає
          </div>
        </div>
        <div class="chat-input-area">
          <input type="text" id="chatInput" placeholder="Напишіть повідомлення..." onkeypress="if(event.key==='Enter') sendMessage()">
          <button class="btn btn-primary" onclick="sendMessage()" style="padding: 12px 18px;">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top: 20px;">
    <div class="info-box" style="background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; text-align: center; font-size: 0.85rem; color: rgba(255,255,255,0.6);">
      <i class="fas fa-flask"></i> Тестове відео: 
      <code style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 6px;">https://www.w3schools.com/html/mov_bbb.mp4</code>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// Анімація фону
function createStars() {
  const bg = document.getElementById('bgAnimation');
  for (let i = 0; i < 100; i++) {
    const star = document.createElement('span');
    star.style.left = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 6 + 's';
    star.style.animationDuration = 3 + Math.random() * 4 + 's';
    star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
    bg.appendChild(star);
  }
}
createStars();

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDEqsA1VXrjLyTixw-urcIyhco_x56kVtw",
  authDomain: "watch2-7672f.firebaseapp.com",
  databaseURL: "https://watch2-7672f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "watch2-7672f",
  storageBucket: "watch2-7672f.firebasestorage.app",
  messagingSenderId: "535788651838",
  appId: "1:535788651838:web:a77c7989426e4697a1586f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomRef = null;
let userRef = null;
let isUpdating = false;
let currentUser = null;

const video = document.getElementById("video");
const statusDiv = document.getElementById("status");
const roomDisplay = document.getElementById("roomDisplay");
const viewersList = document.getElementById("viewersList");
const viewerCountSpan = document.getElementById("viewerCount");
const chatMessages = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");
const nicknameInput = document.getElementById("nickname");
const avatarSelect = document.getElementById("avatarSelect");

// Збереження ніка в localStorage
const savedNick = localStorage.getItem('watchPartyNick');
const savedAvatar = localStorage.getItem('watchPartyAvatar');
if (savedNick) nicknameInput.value = savedNick;
if (savedAvatar) avatarSelect.value = savedAvatar;

function updateStatus(message, type = "info") {
  const icon = {
    success: 'fa-check-circle',
    error: 'fa-exclamation-circle',
    warning: 'fa-exclamation-triangle',
    info: 'fa-info-circle'
  };
  statusDiv.innerHTML = `<i class="fas ${icon[type]}"></i><span>${message}</span>`;
  statusDiv.className = `status ${type}`;
  console.log(`[${type}] ${message}`);
}

function getRandomColor() {
  const colors = ['#e50914', '#ff4757', '#ff6b81', '#ffa502', '#7bed9f', '#70a1ff', '#eccc68', '#ff7f50'];
  return colors[Math.floor(Math.random() * colors.length)];
}

// Додати повідомлення в чат
function addChatMessage(user, message, avatar, time) {
  const messageDiv = document.createElement('div');
  messageDiv.className = 'chat-message';
  messageDiv.innerHTML = `
    <div class="chat-avatar" style="background: linear-gradient(135deg, ${getRandomColor()}, #ff4757);">
      ${avatar}
    </div>
    <div class="chat-bubble">
      <div class="chat-name">${escapeHtml(user)}</div>
      <div class="chat-text">${escapeHtml(message)}</div>
      <div class="chat-time">${time}</div>
    </div>
  `;
  
  if (chatMessages.children[0] && chatMessages.children[0].innerText.includes('Повідомлень поки немає')) {
    chatMessages.innerHTML = '';
  }
  chatMessages.appendChild(messageDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Оновити список глядачів
function updateViewers(users) {
  if (!users) {
    viewersList.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.5); padding: 20px;">👀 Нікого немає</div>';
    viewerCountSpan.textContent = '0';
    return;
  }
  
  const userArray = Object.entries(users);
  viewerCountSpan.textContent = userArray.length;
  
  if (userArray.length === 0) {
    viewersList.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.5); padding: 20px;">👀 Нікого немає</div>';
    return;
  }
  
  viewersList.innerHTML = userArray.map(([id, user]) => `
    <div class="viewer-item">
      <div class="viewer-avatar" style="background: linear-gradient(135deg, ${getRandomColor()}, #ff4757);">
        ${user.avatar || '😀'}
      </div>
      <div class="viewer-info">
        <div class="viewer-name">${escapeHtml(user.nickname || 'Анонім')}</div>
        <div class="viewer-status"><i class="fas fa-circle"></i> в кімнаті</div>
      </div>
    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Відправити повідомлення
window.sendMessage = function() {
  if (!roomRef || !currentUser) {
    updateStatus("Спочатку приєднайтесь до кімнати!", "error");
    return;
  }
  
  const message = chatInput.value.trim();
  if (!message) return;
  
  const chatRef = db.ref("rooms/" + document.getElementById("room").value.trim() + "/chat");
  chatRef.push({
    user: currentUser.nickname,
    avatar: currentUser.avatar,
    message: message,
    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  });
  
  chatInput.value = '';
};

window.joinRoom = function() {
  const room = document.getElementById("room").value.trim();
  const nickname = nicknameInput.value.trim();
  const avatar = avatarSelect.value;
  
  if (!room) {
    updateStatus("Введіть назву кімнати!", "error");
    return;
  }
  
  if (!nickname) {
    updateStatus("Введіть ваше ім'я!", "error");
    return;
  }
  
  // Зберігаємо дані
  localStorage.setItem('watchPartyNick', nickname);
  localStorage.setItem('watchPartyAvatar', avatar);
  
  currentUser = {
    id: Date.now() + '_' + Math.random(),
    nickname: nickname,
    avatar: avatar
  };
  
  if (roomRef) {
    if (userRef) userRef.remove();
    roomRef.off();
  }
  
  roomRef = db.ref("rooms/" + room);
  userRef = roomRef.child("users").child(currentUser.id);
  
  // Додаємо користувача
  userRef.set({
    nickname: currentUser.nickname,
    avatar: currentUser.avatar,
    joinedAt: Date.now()
  });
  
  // Видаляємо при виході
  window.addEventListener('beforeunload', () => {
    if (userRef) userRef.remove();
  });
  
  // Слухаємо глядачів
  roomRef.child("users").on("value", (snapshot) => {
    updateViewers(snapshot.val());
  });
  
  // Слухаємо чат
  roomRef.child("chat").on("child_added", (snapshot) => {
    const data = snapshot.val();
    addChatMessage(data.user, data.message, data.avatar, data.time);
  });
  
  // Слухаємо відео
  roomRef.on("value", (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    
    updateStatus(`В кімнаті: ${room}`, "success");
    roomDisplay.style.display = "inline-block";
    roomDisplay.innerHTML = `<i class="fas fa-hashtag"></i> ${room} • ${nickname}`;
    isUpdating = true;
    
    if (data.video && video.src !== data.video) {
      video.src = data.video;
      video.load();
      updateStatus("Відео завантажено", "success");
    }
    
    if (data.time !== undefined && Math.abs(video.currentTime - data.time) > 1) {
      video.currentTime = data.time;
    }
    
    if (data.playing) {
      video.play().catch(() => updateStatus("Натисніть Play на відео", "warning"));
    } else {
      video.pause();
    }
    
    isUpdating = false;
  });
  
  updateStatus(`Приєднано до "${room}" як ${nickname}`, "success");
};

window.setVideo = function() {
  if (!roomRef) {
    updateStatus("Спочатку натисніть Join!", "error");
    return;
  }
  
  const url = document.getElementById("videoUrl").value.trim();
  if (!url) {
    updateStatus("Вставте посилання на відео!", "error");
    return;
  }
  
  updateStatus("Відправка...", "info");
  
  roomRef.update({
    video: url,
    time: 0,
    playing: false
  }).then(() => {
    updateStatus("Відео відправлено!", "success");
  }).catch((error) => {
    updateStatus(`Помилка: ${error.message}`, "error");
  });
};

video.addEventListener("play", () => {
  if (roomRef && !isUpdating) {
    roomRef.update({ playing: true, time: video.currentTime });
  }
});

video.addEventListener("pause", () => {
  if (roomRef && !isUpdating) {
    roomRef.update({ playing: false, time: video.currentTime });
  }
});

video.addEventListener("seeked", () => {
  if (roomRef && !isUpdating) {
    roomRef.update({ time: video.currentTime });
  }
});
