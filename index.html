<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Watch Party 🎬</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #1a1a1a; color: white; }
    input, button { padding: 10px; margin: 5px; font-size: 16px; }
    input { background: #333; color: white; border: 1px solid #555; }
    button { background: #e50914; color: white; border: none; cursor: pointer; }
    button:hover { background: #f6121d; }
    video { max-width: 100%; margin-top: 20px; border-radius: 8px; }
  </style>
</head>
<body>

<h2>🎬 Watch Party - Спільний перегляд</h2>

<input id="room" placeholder="Назва кімнати (наприклад: film1)" style="width: 200px;">
<button onclick="joinRoom()">Join</button>

<br><br>

<input id="videoUrl" placeholder="Встав посилання на .mp4 або .m3u8" style="width: 400px;">
<button onclick="setVideo()">Load</button>

<br>

<video id="video" width="800" controls></video>

<!-- ✅ ВИКОРИСТОВУЄМО СТАРУ ВЕРСІЮ FIREBASE (8.10.1) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- HLS підтримка для .m3u8 -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="script.js"></script>

</body>
</html>
