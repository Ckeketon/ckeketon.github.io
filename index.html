<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Party 🎬</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #1a1a1a; color: white; text-align: center; margin: 0; }
    input, button { padding: 10px; margin: 5px; font-size: 16px; border-radius: 5px; }
    input { background: #333; color: white; border: 1px solid #555; width: 80%; max-width: 300px; }
    button { background: #e50914; color: white; border: none; cursor: pointer; }
    button:hover { background: #f6121d; }
    .video-container { 
      position: relative; 
      width: 90%; 
      max-width: 800px; 
      margin: 20px auto;
      background: black;
      border-radius: 8px;
      overflow: hidden;
    }
    .video-container iframe {
      width: 100%;
      height: 450px;
      border: none;
    }
    .info { margin-top: 20px; padding: 10px; background: #333; border-radius: 5px; font-size: 12px; }
    .status { 
      margin-top: 10px; 
      padding: 10px; 
      border-radius: 5px; 
      font-size: 14px;
      font-weight: bold;
    }
    .status.success { background: #4caf50; color: white; }
    .status.error { background: #f44336; color: white; }
    .status.warning { background: #ff9800; color: white; }
    .status.info { background: #2196f3; color: white; }
    input[type="text"] { width: 70%; }
    @media (max-width: 600px) {
      .video-container iframe { height: 250px; }
      input[type="text"] { width: 90%; }
    }
  </style>
</head>
<body>

<h2>🎬 Watch Party - Аніме разом</h2>

<input id="room" placeholder="Назва кімнати">
<button onclick="joinRoom()">Join</button>

<br><br>

<input id="videoUrl" placeholder="YouTube посилання або .mp4 / .m3u8">
<button onclick="setVideo()">Load</button>

<br>

<div id="video-container" class="video-container">
  <div id="video-placeholder" style="color: white; padding: 50px;">🎥 Виберіть відео</div>
</div>

<div id="status" class="status info">🟡 Ініціалізація...</div>
<div class="info">
  📺 Підтримується: YouTube, .mp4, .m3u8<br>
  1️⃣ Введіть кімнату → Join<br>
  2️⃣ Вставте посилання → Load<br>
  3️⃣ Дайте другу URL та назву кімнати
</div>

<!-- Firebase v12 -->
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js"
    }
  }
</script>

<script src="https://www.youtube.com/iframe_api"></script>
<script type="module" src="script.js"></script>

</body>
</html>
